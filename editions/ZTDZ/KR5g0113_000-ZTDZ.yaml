body:
  text: 贛州聖濟廟靈跡碑納九聖濟廟者初興於贛漸流布於四方所在郡縣多有之神盖姓石氏名固贛人也生于秦代既殁能發祥焉漢高帝六年遣懿侯灌嬰略定江南至贛贛時屬豫章郡與南粤接壤尉陀㓂邊嬰將兵擊之神降于絶頂峯告以克捷之期已而有功館神於崇福里人稱爲石固王廟唐大中元年里民間諒被酒爲魅所惑墜于崖下符爽行賈長汀舟幾覆成有所禱諒即返其廬爽見神來護之於是卜貢江東之雷岡相率造新廟塐石爲像奉焉相傳廟初建時天地爲之晦冥録事吴君暨司户蕭君令康黄二衙官先後往視皆立化二君亦繼亡逮今祀爲配神雲自時厥後神屢顯嘉應州之東北有二洲曰藍澱曰乾渡每當長夏水易涸隱起若岡阜舟楫不通宋嘉祐八年趙抃報政而歸通溝焉亟徼靈于廟水清漲者八尺清漲俗謂無雨而水自盈也元祐元年夏五月不雨徧禜山川弗應郡守孔平仲迎神至鬱孤臺燭未見跋甘霖如瀉四年東城災風烈火熾將延於庫庾林顔正佩郡章急呼神曰盍憫我烝民俄反風滅火六年復災耄倪遥望雷岡而拜月明如晝忽陰雲四合大雨驟至虐𦦨頓熄建炎三年隆祐太后孟氏駐蹕于贛金人深入至造水髣髴覩神擁陰兵甚衆乃旋紹興十九年鄱陽許中爲郡欲新神之祠召大姓二十人立庭下諭之衆推張銳郭文振心計開敏宜爲糾率二人謝不能許乃分一番紙如其人之數書二爲正副字雜封之令自得墨者職如書各取其一開之則得書者二人也衆以神與心通不日而祠成二十七年禁兵合山㓂據城逆命子女金帛驅輦殆盡高宗命都統制李耕殲之陰霾挟逆飈爲患士卒弗能前耕私祈焉頃之風順天朗一鼓而城平自是王師南征無不祀以牲牢乞陰兵爲助者淳熙十六年歲當大比州人士劉文粲以夢徵于神夢三十人執高竹而立因更名筌遂入郷選嘉定十年夏大霖雨江水暴溢城不浸者三版民懼爲魚泣禱甚哀水尋退亡害紹定三年黥卒朱先帥其徒陳達周進蔡發以叛有旨擢荆襄監軍陳塏提刑江西仍護諸將致討夜駐廬陵夢神告曰先將竄番禺爾宜速圖塏密命胡巖起李强疾趨至贛合三寨兵戮之淳祐七年湖南夷獠曾旨肅聚倡亂聲提江右部使者鄭逢辰檄王舜進攻如有神立青霄兇徒沮駭卒就殄滅九年安遠崔文廣爲變倚石壁作窟穴潼川姚希得來持憲節駐兵守之久且弗拔㓂見雲中若旗幟飛翻其膽遂落渠魁乃擒景定三年郡有黎氏獄胥吏受賕拷掠良民使之承左司吴革疑焉神告以先兆卒白其寃元至元十七年閩卒張彦真入廟吐舌數寸足懸半空自述其陰私頗悉類有人鞫讞之盖神之顯靈共事不翅數百而於雨暘疫癘之禱驗者尤夥濂唯各舉其著書之所不書者可以例見也宋寳慶間莆田傅燁爲贛縣東尉豔神之爲撰爲繇辭百章俾人占之其響荅吉凶往往如神面語之者此亦陰翊治化之一端也吴楊溥時以神能禦菑捍患有合祭法署爲昭靈王宋五封至崇惠顯慶昭烈忠佑王賜廟額曰嘉濟元三易封爲護國普仁崇惠靈應聖烈忠佑王復更之以今額其褒揚光著可謂備矣至若高宗所錫赭黄袍纒絲碼碯帶及南唐李煜五龍視至今猶藏廟中云濂稽諸經國有凶荒則索鬼神而祭之士有疾病則行禱於五祀先王必以神爲可依故建是祠祝之制也世之號爲儒者多指鬼神於茫昩稍與語及之弗以爲誣則斥以爲惑不幾於悖經矣乎有若神者功在國家德被生民自漢及今孰不知依之雖近代名臣若劉安世若蘇軾兄弟若洪邁若辛棄疾若文天祥亦勤勤致敬而弗之怠是數君子者將非儒也邪何其與世人異也濂初被召而起神示以文物之祥後果入翰林爲學士心竊奇之今祝史韋中及弟志勤以靈跡款見唐宋之文使從子法凱請濂通述之因不欲辭造文俾刻焉或謂高帝未嘗伐粤第遣陸賈賫璽綬立佗爲南粤王濂按傳記嬰之略定豫章在六年庚子佗之稱臣在十一年乙巳其未臣之前惡知不來侵境而嬰擊退之邪恐史家以其事微故略之爾敢並及之系之以詩曰神雷之岡翠參差五螭天矯含精微叢祠四阿儼翬飛像變翕赩五采施陰爽襲人動曾颸發祥傳自炎劉初粤氛侵徼告捷期豈或天星隕魄爲降靈于人賛化機以石爲氏理則宜大中卜遷墨食龜有聲渢渢達四垂風霆號令疑所司禾𥝻穟穟歲不饑民氓鼓腹酣以嬉建炎火德值中衰宫車駐蹕贛之麋完顔㸃卒大步追神兵暗樹雲中旗卷甲疾走如竄貍莫徭嘯呼引䝤夷禁軍荷祋據城池屠劉壯健到嬰兒威神有赫助王師一殲兇堅無孑遺貢江水落洲如坻鉅舟皆膠牢弗移鞠躬再拜叩靈墀亦日火烈雲不衣鴻濤清漲没石磯陰翊王度功何疑紫泥鸞誥自天題爵爲真王手秉珪風馬雲輿時往來赭袍寵異帶纒絲五龍寳研角鬛奇襲藏出中夜吐輝陽陰斡運無端倪焄蒿悽愴如見之休咎有徵神所持委以惚怳邈難知奚不來索庭中碑洪武辛亥春正月國子司業金華宋濂撰
